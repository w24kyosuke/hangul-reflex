<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangul Reflex - 1文字ハングルタイピング</title>
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg: #F3F4F6;
            --surface: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --success: #10B981;
            --easy: #10B981;
            --easy-hover: #059669;
            --normal: #3B82F6;
            --normal-hover: #2563EB;
            --hard: #EF4444;
            --hard-hover: #DC2626;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--surface);
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 100%;
            max-width: 550px;
        }

        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 1.8rem;
        }

        .description {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* ゲーム画面用スタイル */
        #game-area, #result-area {
            display: none;
        }

        .target-char {
            font-size: 6rem;
            font-weight: bold;
            margin: 1.5rem 0;
            line-height: 1;
            color: var(--text-main);
        }

        input[type="text"] {
            font-size: 2rem;
            text-align: center;
            width: 100px;
            padding: 0.5rem;
            border: 2px solid #D1D5DB;
            border-radius: 0.5rem;
            outline: none;
            transition: border-color 0.2s;
            ime-mode: active;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .stats-board {
            display: flex;
            justify-content: space-around;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #E5E7EB;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--primary);
        }

        .difficulty-select {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 1rem;
        }

        button {
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:active { transform: scale(0.98); }
        
        .btn-easy { background-color: var(--easy); }
        .btn-easy:hover { background-color: var(--easy-hover); }
        .btn-normal { background-color: var(--normal); }
        .btn-normal:hover { background-color: var(--normal-hover); }
        .btn-hard { background-color: var(--hard); }
        .btn-hard:hover { background-color: var(--hard-hover); }
        .btn-reset { background-color: var(--primary); margin-top: 1rem;}
        .btn-reset:hover { background-color: var(--primary-hover); }

        .progress {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        
        .current-diff {
            display: inline-block;
            font-size: 0.8rem;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            color: white;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="container" id="start-screen">
    <h1>Hangul Reflex v2</h1>
    <p class="description">
        ハングル1文字の入力速度を極めるゲーム。<br>
        難易度を選択してスタートしてください。
    </p>
    <p style="color: #EF4444; font-size: 0.85rem; margin-bottom: 1.5rem;">※プレイ前にキーボードを「韓国語入力（ハングル）」に切り替えてください。</p>
    
    <div class="difficulty-select">
        <button class="btn-easy" onclick="startGame('easy')">Easy<br><span style="font-size:0.7rem;font-weight:normal;">(パッチムなし・基本)</span></button>
        <button class="btn-normal" onclick="startGame('normal')">Normal<br><span style="font-size:0.7rem;font-weight:normal;">(日常頻出ハングル)</span></button>
        <button class="btn-hard" onclick="startGame('hard')">Hard<br><span style="font-size:0.7rem;font-weight:normal;">(複雑なパッチム・レア)</span></button>
    </div>
</div>

<div class="container" id="game-area">
    <div class="progress" id="progress-text">問題: 1 / 10</div>
    <div class="current-diff" id="diff-badge">Normal</div>
    <div class="target-char" id="target-display">가</div>
    <input type="text" id="hangul-input" autocomplete="off" spellcheck="false" placeholder="입력">
    
    <div class="stats-board">
        <div class="stat-item">
            <span class="stat-label">反応時間</span>
            <span class="stat-value" id="current-reaction">--- ms</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">構築時間</span>
            <span class="stat-value" id="current-typing">--- ms</span>
        </div>
    </div>
</div>

<div class="container" id="result-area">
    <h1>Result</h1>
    <div style="margin: 2rem 0;">
        <div class="stat-item" style="margin-bottom: 1.5rem;">
            <span class="stat-label">平均 反応時間 (認識〜第1打)</span>
            <span class="stat-value" style="font-size: 2rem;" id="avg-reaction">0 ms</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">平均 構築時間 (第1打〜完成)</span>
            <span class="stat-value" style="font-size: 2rem;" id="avg-typing">0 ms</span>
        </div>
    </div>
    <button class="btn-reset" onclick="resetGame()">タイトルへ戻る</button>
</div>

<script>
    const TOTAL_QUESTIONS = 10;
    let currentTarget = '';
    let questionCount = 0;
    let currentDifficulty = 'normal';
    
    let timeCharAppeared = 0;
    let timeFirstKeyPressed = 0;
    
    let reactionTimes = [];
    let typingTimes = [];

    // UI要素
    const startScreen = document.getElementById('start-screen');
    const gameArea = document.getElementById('game-area');
    const resultArea = document.getElementById('result-area');
    const targetDisplay = document.getElementById('target-display');
    const inputField = document.getElementById('hangul-input');
    const progressText = document.getElementById('progress-text');
    const diffBadge = document.getElementById('diff-badge');
    const currentReactionDisplay = document.getElementById('current-reaction');
    const currentTypingDisplay = document.getElementById('current-typing');

    // === ハングル生成アルゴリズム ===
    // ハングルは 0xAC00 + (初声 * 588) + (中声 * 28) + 終声 で計算される
    function getWeightedRandomHangul(difficulty) {
        let cho, jung, jong;

        const pickRandom = (arr) => arr[Math.floor(Math.random() * arr.length)];
        
        // 重み付きランダム選択関数
        const weightedRandom = (items) => {
            let sum = items.reduce((acc, item) => acc + item.w, 0);
            let r = Math.random() * sum;
            for (let item of items) {
                r -= item.w;
                if (r <= 0) return pickRandom(item.val);
            }
            return pickRandom(items[items.length - 1].val);
        };

        // 初声（子音）グループ
        const CHO_BASIC = [0, 2, 3, 5, 6, 7, 9, 11, 12, 18]; // ㄱ,ㄴ,ㄷ,ㄹ,ㅁ,ㅂ,ㅅ,ㅇ,ㅈ,ㅎ (超頻出)
        const CHO_ASPIRATED = [14, 15, 16, 17]; // ㅊ,ㅋ,ㅌ,ㅍ (激音)
        const CHO_TENSE = [1, 4, 8, 10, 13]; // ㄲ,ㄸ,ㅃ,ㅆ,ㅉ (濃音)

        // 中声（母音）グループ
        const JUNG_BASIC = [0, 4, 8, 13, 18, 20]; // ㅏ,ㅓ,ㅗ,ㅜ,ㅡ,ㅣ (超頻出)
        const JUNG_Y = [1, 5, 2, 6, 12, 17]; // ㅐ,ㅔ,ㅑ,ㅕ,ㅛ,ㅠ
        const JUNG_W = [9, 11, 14, 15, 19]; // ㅘ,ㅚ,ㅝ,ㅟ,ㅢ
        const JUNG_COMPLEX = [3, 7, 10, 16]; // ㅒ,ㅖ,ㅙ,ㅞ (レア)

        // 終声（パッチム）グループ
        const JONG_NONE = [0]; // パッチムなし
        const JONG_BASIC = [4, 21, 8, 1, 16, 17]; // ㄴ,ㅇ,ㄹ,ㄱ,ㅁ,ㅂ (頻出パッチム)
        const JONG_RARE = [19, 20, 22, 23, 24, 26, 27]; // ㅅ,ㅆ,ㅈ,ㅊ,ㅋ,ㅍ,ㅎ
        const JONG_COMPLEX = [2, 3, 5, 6, 7, 9, 10, 11, 12, 13, 14, 15, 18, 25]; // 複雑・二重パッチム

        if (difficulty === 'easy') {
            // Easy: 基本子音・母音のみ、パッチムなし
            cho = pickRandom(CHO_BASIC);
            jung = pickRandom(JUNG_BASIC);
            jong = 0;
        } else if (difficulty === 'normal') {
            // Normal: 実際の韓国語の出現頻度に近いバランス
            cho = weightedRandom([
                {val: CHO_BASIC, w: 70}, {val: CHO_ASPIRATED, w: 20}, {val: CHO_TENSE, w: 10}
            ]);
            jung = weightedRandom([
                {val: JUNG_BASIC, w: 60}, {val: JUNG_Y, w: 25}, {val: JUNG_W, w: 10}, {val: JUNG_COMPLEX, w: 5}
            ]);
            jong = weightedRandom([
                {val: JONG_NONE, w: 45}, {val: JONG_BASIC, w: 45}, {val: JONG_RARE, w: 8}, {val: JONG_COMPLEX, w: 2}
            ]);
        } else {
            // Hard: 頻出文字の確率を下げ、濃音・複雑な母音・複雑なパッチムの確率を爆上げ
            cho = weightedRandom([
                {val: CHO_BASIC, w: 20}, {val: CHO_ASPIRATED, w: 30}, {val: CHO_TENSE, w: 50}
            ]);
            jung = weightedRandom([
                {val: JUNG_BASIC, w: 20}, {val: JUNG_Y, w: 30}, {val: JUNG_W, w: 30}, {val: JUNG_COMPLEX, w: 20}
            ]);
            jong = weightedRandom([
                {val: JONG_NONE, w: 10}, {val: JONG_BASIC, w: 20}, {val: JONG_RARE, w: 30}, {val: JONG_COMPLEX, w: 40}
            ]);
        }

        return String.fromCharCode(0xAC00 + (cho * 588) + (jung * 28) + jong);
    }

    // ゲーム開始
    function startGame(difficulty) {
        currentDifficulty = difficulty;
        questionCount = 0;
        reactionTimes = [];
        typingTimes = [];
        
        // バッジのスタイル設定
        diffBadge.innerText = difficulty.toUpperCase();
        if(difficulty === 'easy') diffBadge.style.backgroundColor = 'var(--easy)';
        if(difficulty === 'normal') diffBadge.style.backgroundColor = 'var(--normal)';
        if(difficulty === 'hard') diffBadge.style.backgroundColor = 'var(--hard)';

        startScreen.style.display = 'none';
        resultArea.style.display = 'none';
        gameArea.style.display = 'block';
        
        nextQuestion();
    }

    function nextQuestion() {
        if (questionCount >= TOTAL_QUESTIONS) {
            showResult();
            return;
        }

        questionCount++;
        progressText.innerText = `問題: ${questionCount} / ${TOTAL_QUESTIONS}`;
        
        // 難易度に応じたハングルを生成
        currentTarget = getWeightedRandomHangul(currentDifficulty);
        targetDisplay.innerText = currentTarget;
        
        inputField.value = '';
        inputField.focus();
        
        timeFirstKeyPressed = 0;
        timeCharAppeared = performance.now();
    }

    // キーボードの最初の入力（反応）を検知
    inputField.addEventListener('keydown', (e) => {
        if (e.key === 'Shift' || e.key === 'Control' || e.key === 'Alt' || e.key === 'Meta') return;

        if (timeFirstKeyPressed === 0) {
            timeFirstKeyPressed = performance.now();
            const reactionTime = timeFirstKeyPressed - timeCharAppeared;
            currentReactionDisplay.innerText = `${reactionTime.toFixed(0)} ms`;
        }
    });

    // 入力値の変更（ハングルの構築）を検知
    inputField.addEventListener('input', (e) => {
        if (inputField.value === currentTarget) {
            const timeCharCompleted = performance.now();
            
            if (timeFirstKeyPressed === 0) timeFirstKeyPressed = timeCharAppeared;

            const reactionTime = timeFirstKeyPressed - timeCharAppeared;
            const typingTime = timeCharCompleted - timeFirstKeyPressed;

            reactionTimes.push(reactionTime);
            typingTimes.push(typingTime);

            currentTypingDisplay.innerText = `${typingTime.toFixed(0)} ms`;
            
            targetDisplay.style.color = 'var(--success)';
            inputField.disabled = true;

            setTimeout(() => {
                targetDisplay.style.color = 'var(--text-main)';
                inputField.disabled = false;
                nextQuestion();
            }, 400);
        }
    });

    // 結果画面
    function showResult() {
        gameArea.style.display = 'none';
        resultArea.style.display = 'block';

        const avgReaction = reactionTimes.reduce((a, b) => a + b, 0) / reactionTimes.length;
        const avgTyping = typingTimes.reduce((a, b) => a + b, 0) / typingTimes.length;

        document.getElementById('avg-reaction').innerText = `${avgReaction.toFixed(0)} ms`;
        document.getElementById('avg-typing').innerText = `${avgTyping.toFixed(0)} ms`;
        
        currentReactionDisplay.innerText = '--- ms';
        currentTypingDisplay.innerText = '--- ms';
    }

    // リセット
    function resetGame() {
        resultArea.style.display = 'none';
        startScreen.style.display = 'block';
    }
</script>
</body>
</html>
